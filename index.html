    <meta name="theme-color" content="#8B5CF6">

    <!-- Critical CSS inlined for immediate rendering -->
    <style>
      /* Critical path styles - optimized for LCP */
      body {
        background: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        line-height: 1.6;
        color: #1e293b;
        font-display: swap;
      }
      
      /* Logo optimization to prevent layout shift */
      .logo-container {
        height: 40px;
        width: 120px;
        display: flex;
        align-items: center;
      }
      
      .logo-container img {
        height: 100%;
        width: auto;
        object-fit: contain;
        font-style: italic;
        background-color: #f3f4f6;
      }
      
      /* Navigation height to prevent layout shift */
      nav {
        height: 64px;
        background: white;
        border-bottom: 1px solid #e5e7eb;
      }
      
      /* Hero section optimization for LCP */
      .hero-section {
        min-height: 80vh;
        background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #1e293b 100%);
        contain: layout style paint;
      }
      
      /* Optimized loading animation */
      .critical-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #fff;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.3s ease;
      }
      
      .critical-loader::after {
        content: '';
        width: 24px;
        height: 24px;
        border: 2px solid #f3f4f6;
        border-top: 2px solid #8B5CF6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        will-change: transform;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg) }
        100% { transform: rotate(360deg) }
      }
      
      /* Hide loader when content loads */
      .content-loaded .critical-loader {
        opacity: 0;
        pointer-events: none;
      }
      
      /* Optimize images for faster loading */
      img {
        font-style: italic;
        background-repeat: no-repeat;
        background-size: cover;
        background-color: #f3f4f6;
        max-width: 100%;
        height: auto;
      }
      
      /* Critical button styles */
      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        transition: transform 0.15s ease;
        will-change: transform;
      }
      
      /* Reduce motion for accessibility and performance */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
      
      /* Data saver optimizations */
      .data-saver * {
        animation: none !important;
        transition: none !important;
      }
    </style>

    <!-- Performance monitoring script -->
    <script>
      // Initialize critical performance tracking
      window.perfData = {
        start: performance.now(),
        marks: {},
        measures: {}
      };
      
      // Mark content loading stages
      window.addEventListener('DOMContentLoaded', function() {
        window.perfData.marks.domReady = performance.now();
        document.body.classList.add('content-loaded');
        console.log('📊 DOM Ready:', (window.perfData.marks.domReady - window.perfData.start).toFixed(2) + 'ms');
      });
      
      window.addEventListener('load', function() {
        window.perfData.marks.loadComplete = performance.now();
        console.log('📊 Load Complete:', (window.perfData.marks.loadComplete - window.perfData.start).toFixed(2) + 'ms');
        
        // Initialize deferred analytics after load
        setTimeout(function() {
          if (typeof gtag !== 'undefined') {
            gtag('config', 'G-KND5GPN1W7', { 
              page_load_time: Math.round(window.perfData.marks.loadComplete - window.perfData.start),
              send_page_view: true
            });
          }
        }, 100);
      });
      
      // Track Core Web Vitals
      if ('PerformanceObserver' in window) {
        // LCP tracking
        new PerformanceObserver(function(entryList) {
          const entries = entryList.getEntries();
          const lastEntry = entries[entries.length - 1];
          console.log('📊 LCP:', lastEntry.startTime.toFixed(2) + 'ms');
        }).observe({entryTypes: ['largest-contentful-paint']});
        
        // FID tracking
        new PerformanceObserver(function(entryList) {
          entryList.getEntries().forEach(function(entry) {
            const fid = entry.processingStart - entry.startTime;
            console.log('📊 FID:', fid.toFixed(2) + 'ms');
          });
        }).observe({entryTypes: ['first-input']});
      }
    </script>

    <!-- Deferred analytics loading -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      
      // Load analytics after critical resources
      window.addEventListener('load', function() {
        setTimeout(function() {
          const script = document.createElement('script');
          script.async = true;
          script.src = 'https://www.googletagmanager.com/gtag/js?id=G-KND5GPN1W7';
          document.head.appendChild(script);
