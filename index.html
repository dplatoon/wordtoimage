    <!-- Critical CSS inlined for immediate rendering -->
    <style>
      /* Critical path styles */
      body {
        background: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        line-height: 1.7;
        color: #1e293b;
      }
      
      /* Logo optimization */
      .logo-container {
        height: 40px;
        width: 120px;
        display: flex;
        align-items: center;
      }
      
      .logo-container img {
        height: 100%;
        width: auto;
        object-fit: contain;
      }
      
      /* Remove layout shift for navigation */
      nav {
        height: 64px;
        background: white;
        border-bottom: 1px solid #e5e7eb;
      }
      
      /* Hero section optimization */
      .hero-section {
        min-height: 80vh;
        background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #1e293b 100%);
      }
      
      /* Critical loader - simpler version */
      .critical-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #fff;
        z-index: 9999;
      }
      
      .critical-loader::after {
        content: '';
        width: 32px;
        height: 32px;
        border: 2px solid #f3f4f6;
        border-top: 2px solid #8B5CF6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg) }
        100% { transform: rotate(360deg) }
      }
      
      /* Hide loader after content loads */
      .content-loaded .critical-loader {
        display: none;
      }
    </style>
