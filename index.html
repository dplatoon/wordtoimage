      .hero-section {
        min-height: 100vh;
        background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #1e293b 100%);
        contain: layout style paint;
      }
      
      /* Enhanced button contrast for accessibility */
      .btn-primary {
        background: #1E40AF !important; /* Improved contrast 6.2:1 */
        color: #ffffff !important;
        transition: all 0.2s ease;
        will-change: transform;
        min-height: 48px;
        border: none;
        border-radius: 0.75rem;
        font-weight: 600;
      }
      
      .btn-primary:hover {
        background: #1E3A8A !important;
        transform: translateY(-1px);
      }
      
      .btn-primary:focus-visible {
        outline: 3px solid #3B82F6 !important;
        outline-offset: 2px !important;
      }
      
      /* Improved text contrast for accessibility */
      .text-slate-500, .text-gray-500 {
        color: #4a5568 !important; /* Enhanced from #6B7280 for better contrast */
      }
      
      .text-slate-600, .text-gray-600 {
        color: #2d3748 !important;
      }
      
      /* Optimized loading animation */
      .critical-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #fff;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.3s ease;
      }
      
      .critical-loader::after {
        content: '';
        width: 24px;
        height: 24px;
        border: 2px solid #f3f4f6;
        border-top: 2px solid #1E40AF;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        will-change: transform;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg) }
        100% { transform: rotate(360deg) }
      }
      
      /* Hide loader when content loads */
      .content-loaded .critical-loader {
        opacity: 0;
        pointer-events: none;
      }
      
      /* Optimize images for faster loading */
      img {
        font-style: italic;
        background-repeat: no-repeat;
        background-size: cover;
        background-color: #f3f4f6;
        max-width: 100%;
        height: auto;
      }
      
      /* Skip links for accessibility */
      .sr-only {
        position: absolute !important;
        width: 1px !important;
        height: 1px !important;
        padding: 0 !important;
        margin: -1px !important;
        overflow: hidden !important;
        clip: rect(0, 0, 0, 0) !important;
        white-space: nowrap !important;
        border: 0 !important;
      }
      
      .sr-only:focus {
        position: static !important;
        width: auto !important;
        height: auto !important;
        padding: inherit !important;
        margin: inherit !important;
        overflow: visible !important;
        clip: auto !important;
        white-space: normal !important;
      }
      
      /* Reduce motion for accessibility and performance */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
      
      /* High contrast mode support */
      @media (prefers-contrast: high) {
        .btn-primary {
          background: #000000 !important;
          color: #ffffff !important;
          border: 2px solid #000000 !important;
        }
      }

    <!-- Performance monitoring script optimized for Core Web Vitals -->
    <script>
      // Initialize critical performance tracking
      window.perfData = {
        start: performance.now(),
        marks: {},
        measures: {}
      };
      
      // Mark content loading stages for LCP optimization
      window.addEventListener('DOMContentLoaded', function() {
        window.perfData.marks.domReady = performance.now();
        document.body.classList.add('content-loaded');
        console.log('📊 DOM Ready:', (window.perfData.marks.domReady - window.perfData.start).toFixed(2) + 'ms');
      });
      
      window.addEventListener('load', function() {
        window.perfData.marks.loadComplete = performance.now();
        const loadTime = window.perfData.marks.loadComplete - window.perfData.start;
        console.log('📊 Load Complete:', loadTime.toFixed(2) + 'ms');
        
        // Track performance score
        if (loadTime <= 2000) {
          console.log('🎯 Performance: Excellent (< 2s)');
        } else if (loadTime <= 4000) {
          console.log('⚠️ Performance: Good (2-4s)');
        } else {
          console.log('❌ Performance: Needs improvement (> 4s)');
        }
      });
      
      // Enhanced Core Web Vitals tracking
      if ('PerformanceObserver' in window) {
        // LCP tracking with detailed logging
        new PerformanceObserver(function(entryList) {
          const entries = entryList.getEntries();
          const lastEntry = entries[entries.length - 1];
          const lcp = lastEntry.startTime;
          const rating = lcp <= 2500 ? 'good' : lcp <= 4000 ? 'needs_improvement' : 'poor';
          console.log('🎯 LCP:', lcp.toFixed(2) + 'ms', `(${rating})`);
        }).observe({entryTypes: ['largest-contentful-paint']});
        
        // FID tracking
        new PerformanceObserver(function(entryList) {
          entryList.getEntries().forEach(function(entry) {
            const fid = entry.processingStart - entry.startTime;
            const rating = fid <= 100 ? 'good' : fid <= 300 ? 'needs_improvement' : 'poor';
            console.log('⚡ FID:', fid.toFixed(2) + 'ms', `(${rating})`);
          });
        }).observe({entryTypes: ['first-input']});
      }
    </script>
